{{- if and .Values.monitoring.prometheusRule.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1/PrometheusRule") }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ .Release.Name }}-alerts
  labels:
    {{- include "unikorn.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
  - name: {{ .Release.Name }}.region
    rules:
    - alert: UnikornRegionControllerCrashLooping
      expr: |-
        max_over_time(
          kube_pod_container_status_waiting_reason{
            namespace="{{ .Release.Namespace }}",
            reason="CrashLoopBackOff",
            pod=~"{{ .Release.Name }}-(network|load-balancer|identity|server|security-group)-controller-.*"
          }[{{ .Values.monitoring.controllerCrashLoop.window }}]
        ) >= 1
      for: {{ .Values.monitoring.controllerCrashLoop.for }}
      labels:
        severity: {{ .Values.monitoring.controllerCrashLoop.severity | quote }}
        component: unikorn-region
      annotations:
        summary: Unikorn region controller is crash looping.
        description: >-
          Region controller {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }}
          container {{ "{{" }} $labels.container {{ "}}" }} is in CrashLoopBackOff. Network, load balancer,
          identity, security group, or server reconciliation may be degraded. Network fixture cleanup can
          miss identity allocation release, causing stale quota allocations and API test failures.
{{- if .Values.monitoring.identityEndpointProbe.enabled }}
    - alert: UnikornRegionIdentityEndpointUnreachable
      expr: probe_success{job="{{ .Release.Name }}-identity-endpoint"} == 0
      for: {{ .Values.monitoring.identityEndpointProbe.alert.for }}
      labels:
        severity: {{ .Values.monitoring.identityEndpointProbe.alert.severity | quote }}
        component: unikorn-region
      annotations:
        summary: Region identity endpoint is unreachable from the cluster.
        description: >-
          Blackbox probe to {{ .Values.monitoring.identityEndpointProbe.target }} is failing. Region controllers
          that authenticate to the provider identity endpoint may crash during startup, blocking reconciliation
          and cleanup.
{{- end }}
{{- end }}
{{- if and .Values.monitoring.identityEndpointProbe.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1/Probe") }}
---
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: {{ .Release.Name }}-identity-endpoint
  labels:
    {{- include "unikorn.labels" . | nindent 4 }}
    {{- with .Values.monitoring.identityEndpointProbe.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  jobName: {{ .Release.Name }}-identity-endpoint
  interval: {{ .Values.monitoring.identityEndpointProbe.interval }}
  scrapeTimeout: {{ .Values.monitoring.identityEndpointProbe.scrapeTimeout }}
  module: {{ .Values.monitoring.identityEndpointProbe.module | quote }}
  prober:
    url: {{ .Values.monitoring.identityEndpointProbe.prober.url | quote }}
    path: {{ .Values.monitoring.identityEndpointProbe.prober.path | quote }}
  targets:
    staticConfig:
      static:
      - {{ .Values.monitoring.identityEndpointProbe.target | quote }}
      labels:
        component: unikorn-region
        dependency: identity-endpoint
{{- end }}
