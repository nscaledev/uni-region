---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: networks.region.unikorn-cloud.org
spec:
  group: region.unikorn-cloud.org
  names:
    categories:
    - unikorn
    kind: Network
    listKind: NetworkList
    plural: networks
    singular: network
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Available")].reason
      name: status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Network defines a physical network beloning to an identity.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              dnsNameservers:
                description: DNSNameservers are a set of DNS nameservrs for the network.
                items:
                  pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])$
                  type: string
                type: array
              pause:
                description: Pause, if true, will inhibit reconciliation.
                type: boolean
              prefix:
                description: Prefix is the IPv4 address prefix.
                pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\/(?:3[0-2]|[1-2]?[0-9])$
                type: string
              provider:
                description: Provider defines the provider type.
                enum:
                - openstack
                - kubernetes
                - simulated
                maxLength: 63
                type: string
              reservations:
                description: |-
                  Reservations reserve a prefix at the start of the network for
                  infrastructure use such as file storage and internal platform use
                  as directed by the infrastructure provider.
                  For example, on a /24 network a reservation prefix length of 25
                  reserves 192.168.0.0/25, leaving 192.168.0.128-192.168.0.254 for DHCP.
                  When omitted, a default /25 reservation with a /28 provider carve-out
                  applies to all networks.  Explicit reservations always take precedence.
                properties:
                  prefixLength:
                    description: |-
                      PrefixLength defines how much of the network to reserve, starting at the
                      beginning of the network CIDR.  For example, on a /24 network a value of
                      25 reserves the lower half of the network, i.e. 192.168.0.0/25.
                      The network address (.0) and gateway (.1) are platform-reserved within
                      that space, so usable reserved addresses begin at .2.
                    maximum: 30
                    minimum: 0
                    type: integer
                  providerReservedPrefixLength:
                    description: |-
                      ProviderReservedPrefixLength optionally carves a prefix from the start of
                      the reserved space for provider use.  For example, on a /24 network with
                      PrefixLength=25 and ProviderReservedPrefixLength=28, 192.168.0.0/28 is
                      reserved for provider use and storage uses the remainder of the reserved space,
                      192.168.0.16-192.168.0.127.  If this matches PrefixLength, the full
                      reservation is treated as infrastructure space and no storage range is left.
                    maximum: 30
                    minimum: 0
                    type: integer
                required:
                - prefixLength
                type: object
                x-kubernetes-validations:
                - message: provider reserved prefix length must be greater than or
                    equal to the reservation prefix length
                  rule: '!has(self.providerReservedPrefixLength) || (self.providerReservedPrefixLength
                    >= self.prefixLength)'
              routes:
                description: Routes to be distributed via DHCP.
                items:
                  properties:
                    nextHop:
                      description: NextHop address to forward the traffic to.
                      pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])$
                      type: string
                    prefix:
                      description: Prefix to match when forwarding.
                      pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\/(?:3[0-2]|[1-2]?[0-9])$
                      type: string
                  required:
                  - nextHop
                  - prefix
                  type: object
                type: array
              tags:
                description: |-
                  Tags are an abitrary list of key/value pairs that a client
                  may populate to store metadata for the resource.
                items:
                  description: Tag is an arbirary key/value.
                  properties:
                    name:
                      description: Name of the tag.
                      type: string
                    value:
                      description: Value of the tag.
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
            required:
            - prefix
            type: object
            x-kubernetes-validations:
            - message: reservation prefix length must be greater than the network
                prefix length
              rule: '!has(self.reservations) || (self.reservations.prefixLength >
                int(self.prefix.split("/")[1]))'
          status:
            properties:
              conditions:
                description: Current service state of a cluster manager.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              openstack:
                properties:
                  networkID:
                    description: NetworkID is the network ID.
                    type: string
                  storageRange:
                    description: StorageRange gives the start and end IP addresses
                      for attaching to storage (e.g., FileStorage)
                    properties:
                      endIP:
                        description: End is the end IP address for the attachment.
                        pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])$
                        type: string
                      startIP:
                        description: Start is the start IP address for the attachment.
                        pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])$
                        type: string
                    required:
                    - endIP
                    - startIP
                    type: object
                  subnetID:
                    description: SubnetID is the subnet ID.
                    type: string
                  vlanID:
                    description: VlanID is the VLAN ID for this network
                    type: integer
                type: object
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
