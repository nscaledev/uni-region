---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: servers.region.unikorn-cloud.org
spec:
  group: region.unikorn-cloud.org
  names:
    categories:
    - unikorn
    kind: Server
    listKind: ServerList
    plural: servers
    singular: server
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Available")].reason
      name: status
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: age
      type: date
    - jsonPath: .status.privateIP
      name: privateIP
      type: string
    - jsonPath: .status.publicIP
      name: publicIP
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Server defines a server beloning to an identity.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              flavorID:
                description: FlavorID is the flavor ID.
                format: uuid
                type: string
              image:
                description: Image defines a set of rules to lookup for the server
                  image.
                properties:
                  id:
                    description: ID is the image ID. If specified, it has priority
                      over the selector.
                    format: uuid
                    type: string
                required:
                - id
                type: object
              infrastructureRef:
                description: |-
                  InfrastructureRef pins the server to a specific physical host. When set,
                  the provider bypasses its scheduler and provisions directly onto the
                  identified host.
                type: string
              networks:
                description: Networks is the server network configuration.
                items:
                  properties:
                    allowedAddressPairs:
                      description: AllowedAddressPairs is a list of allowed address
                        pairs for the network interface. This will allow multiple
                        MAC/IP address (range) pairs to pass through this port.
                      items:
                        properties:
                          cidr:
                            description: CIDR is the CIDR block to allow traffic from.
                            pattern: ^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9]?[0-9])\/(?:3[0-2]|[1-2]?[0-9])$
                            type: string
                          macAddress:
                            description: Optional MAC address to allow traffic to/from.
                            type: string
                        required:
                        - cidr
                        type: object
                      type: array
                    id:
                      description: ID is the region network ID.
                      format: uuid
                      type: string
                  required:
                  - id
                  type: object
                type: array
              pause:
                description: Pause, if true, will inhibit reconciliation.
                type: boolean
              provider:
                description: Provider defines the provider type.
                enum:
                - openstack
                - kubernetes
                - simulated
                maxLength: 63
                type: string
              publicIPAllocation:
                description: PublicIPAllocation is the server public IP allocation
                  configuration.
                properties:
                  enabled:
                    description: Enabled is a flag to enable public IP allocation.
                    type: boolean
                type: object
              securityGroups:
                description: SecurityGroups is the server security groups.
                items:
                  properties:
                    id:
                      description: ID is the security group ID.
                      format: uuid
                      type: string
                  required:
                  - id
                  type: object
                type: array
              sshCertificateAuthorityID:
                description: SSHCertificateAuthorityID is an optional project scoped
                  OpenSSH user CA trust anchor.
                type: string
              sshInjection:
                description: SSHInjection identifies the create-time SSH access material
                  requested for the server.
                enum:
                - ca
                - identityKeypair
                - none
                type: string
              tags:
                description: |-
                  Tags are an abitrary list of key/value pairs that a client
                  may populate to store metadata for the resource.
                items:
                  description: Tag is an arbirary key/value.
                  properties:
                    name:
                      description: Name of the tag.
                      type: string
                    value:
                      description: Value of the tag.
                      type: string
                  required:
                  - name
                  - value
                  type: object
                type: array
              userData:
                description: UserData contains configuration information or scripts
                  to use upon launch.
                format: byte
                type: string
              volumes:
                description: |-
                  Volumes are existing Region volumes the server should attach.
                  Inline server-created volume templates are intentionally not part of this
                  first storage model.
                items:
                  properties:
                    id:
                      description: ID is the existing Volume resource ID to attach
                        to the server.
                      type: string
                  required:
                  - id
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - id
                x-kubernetes-list-type: map
            required:
            - flavorID
            - image
            type: object
            x-kubernetes-validations:
            - message: infrastructureRef is immutable
              rule: '!has(oldSelf.infrastructureRef) == !has(self.infrastructureRef)
                && (!has(self.infrastructureRef) || self.infrastructureRef == oldSelf.infrastructureRef)'
          status:
            properties:
              conditions:
                description: Current service state of a cluster manager.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              launchedAt:
                description: |-
                  LaunchedAt is the time the provider booted the VM. Nil until the server has
                  been observed Running at least once.
                format: date-time
                type: string
              macAddress:
                description: |-
                  MACAddress is the MAC address of the server's primary (single) network
                  interface. It is owned exclusively by the monitor (the health checker),
                  not the reconciler: it is recorded from the Nova server response once the
                  server reaches ACTIVE, the barrier at which the port MAC is guaranteed
                  bound for VMs and baremetal alike. For baremetal Ironic rebinds the port
                  to the real NIC MAC asynchronously during deploy, so the value observed
                  earlier (e.g. at port-create time) is the ephemeral Neutron MAC and is not
                  trustworthy. It is only ever written, never cleared: the provider-create
                  retry reset leaves it intact and a transient port-read miss cannot unset
                  it, while an authoritative ACTIVE read self-heals any drift.
                type: string
              phase:
                description: Phase is the current lifecycle phase of the server.
                enum:
                - Pending
                - Queued
                - Building
                - Running
                - Stopping
                - Stopped
                - Error
                type: string
              privateIP:
                description: PrivateIP is the private IP address of the server.
                type: string
              providerCreateFailures:
                description: |-
                  ProviderCreateFailures records how many provider-accepted create attempts
                  later landed in a provider error state before the server launched.
                format: int32
                type: integer
              providerCreateRetrying:
                description: |-
                  ProviderCreateRetrying is true while the controller is deleting a failed
                  provider server before making another create attempt.
                type: boolean
              provisionedAt:
                description: |-
                  ProvisionedAt is a write-once latch recording that the server has booted at
                  least once. It is set from the same Nova launched_at signal as LaunchedAt
                  (so it fires for VMs and baremetal alike, regardless of live power state)
                  but, unlike LaunchedAt, it is never cleared: not by the provider-create
                  retry reset, nor by a re-reconcile against a flaky provider. The bounded
                  provider-create delete-and-retry guard keys off this field so a server that
                  has ever booted is never rebuilt (a rebuild after first boot would destroy
                  data). Unlike the reconciler-owned Available condition, it does not flip back
                  to a non-provisioned value on a later re-reconcile.
                format: date-time
                type: string
              publicIP:
                description: PublicIP is the public IP address of the server.
                type: string
              rebuild:
                description: |-
                  Rebuild records the most recent Region-issued rebuild intent for a target
                  image. It is cleared once the server converges on that image. Nova remains
                  authoritative for the live server image and operation state; this marker is
                  used to classify an error observed while rebuild intent is retained; an
                  error arriving after an unobserved success is indistinguishable from a
                  failed rebuild and is treated as one (fails closed).
                  An accepted attempt that later fails parks the server until the desired
                  image changes or the server is replaced.
                properties:
                  state:
                    description: |-
                      State is forward-only (Initiated < Rebuilding < Succeeded == Failed;
                      terminals are peers and never flip — first observation wins), with one
                      exception: the reconciler's park assigns Failed directly, even over
                      Succeeded. It is advanced by the reconciler (Initiated at arm, Rebuilding
                      at accept) and by the monitor's provider poll (Rebuilding/Succeeded/Failed
                      from observed Nova evidence); only the reconciler ever clears or replaces
                      the struct.
                    enum:
                    - Initiated
                    - Rebuilding
                    - Succeeded
                    - Failed
                    type: string
                  targetImageID:
                    description: |-
                      TargetImageID is the desired image of the rebuild Region issued. It is
                      write-ahead intent: the provider persists it (via a yield) before Nova
                      is asked to act, because it is the one fact a failed rebuild cannot be
                      distinguished from an unrelated failure without.
                    format: uuid
                    type: string
                required:
                - state
                - targetImageID
                type: object
              scheduledAt:
                description: |-
                  ScheduledAt is the time the provider accepted and processed the creation request.
                  Nil until the server has been observed in the provider at least once.
                format: date-time
                type: string
              volumes:
                description: Volumes reflects the observed attachment state for each
                  desired volume.
                items:
                  properties:
                    device:
                      description: |-
                        Device is the guest OS device name where the provider presents the
                        attached volume, when available.
                      type: string
                    id:
                      description: ID is the Volume resource ID this attachment row
                        describes.
                      type: string
                    message:
                      description: Message is a human-readable description of the
                        current attachment state.
                      type: string
                    provisioningStatus:
                      description: |-
                        ProvisioningStatus indicates whether the volume attachment is ready,
                        failed, or being provisioned/deprovisioned.
                      enum:
                      - Provisioning
                      - Provisioned
                      - Errored
                      - Deprovisioning
                      type: string
                  required:
                  - id
                  - message
                  - provisioningStatus
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - id
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
