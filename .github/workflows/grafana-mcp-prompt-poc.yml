name: Grafana MCP Prompt POC

run-name: Grafana MCP Prompt POC - ${{ github.event.inputs.grafana_app || 'nks-stg-europe-west2-grafana' }}

on:
  push:
    branches:
      - codex/grafana-mcp-prompt-poc
  workflow_dispatch:
    inputs:
      grafana_app:
        description: Teleport Grafana app name.
        required: false
        default: nks-stg-europe-west2-grafana
      loki_datasource_uid:
        description: Optional Loki datasource UID filter. Leave empty to query all log-capable datasources.
        required: false
        default: ''
      lookback_minutes:
        description: Query lookback window in minutes.
        required: false
        default: '60'
      limit:
        description: Maximum Loki rows to print.
        required: false
        default: '10'
      prompt:
        description: Natural-language task for Claude through Grafana MCP.
        required: false
        default: List the last 10 errors by category from Loki using Grafana MCP.

permissions:
  contents: read
  id-token: write

jobs:
  list-last-errors:
    name: List last 10 errors by category
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GRAFANA_APP: ${{ github.event.inputs.grafana_app || 'nks-stg-europe-west2-grafana' }}
      GRAFANA_MCP_PORT: '8000'
      GRAFANA_MCP_VERSION: v0.7.10
      GRAFANA_TUNNEL_PORT: '3000'
      LIMIT: ${{ github.event.inputs.limit || '10' }}
      LOKI_DATASOURCE_UID: ${{ github.event.inputs.loki_datasource_uid || '' }}
      LOOKBACK_MINUTES: ${{ github.event.inputs.lookback_minutes || '60' }}
      USER_PROMPT: ${{ github.event.inputs.prompt || 'List the last 10 errors by category from Loki using Grafana MCP.' }}

    steps:
      # Install: fetch the binaries used by the rest of the POC.
      - name: Install - Teleport clients
        uses: teleport-actions/setup@a820ebbf1bc1a496efca348ad21042d6e8df73a6
        with:
          version: auto
          proxy: nscale.teleport.sh:443

      - name: Install - Grafana MCP server
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Pick the release artifact that matches the GitHub runner CPU.
          case "$(uname -m)" in
            x86_64|amd64) artifact="mcp-grafana_Linux_x86_64.tar.gz" ;;
            aarch64|arm64) artifact="mcp-grafana_Linux_arm64.tar.gz" ;;
            *) echo "::error::Unsupported architecture: $(uname -m)"; exit 1 ;;
          esac

          gh release download -R grafana/mcp-grafana "$GRAFANA_MCP_VERSION" \
            --pattern "$artifact" \
            --output "${RUNNER_TEMP}/mcp-grafana.tar.gz"
          tar -xzf "${RUNNER_TEMP}/mcp-grafana.tar.gz" -C "${RUNNER_TEMP}"
          sudo mv "${RUNNER_TEMP}/mcp-grafana" /usr/local/bin/mcp-grafana
          mcp-grafana --help >/dev/null 2>&1

      # Setup: open the private Grafana app and expose it through MCP.
      - name: Setup - Open Grafana app tunnel
        uses: teleport-actions/application-tunnel@bb7a8fbfb67b85d26013554f10d71dd032c1c764
        with:
          proxy: nscale.teleport.sh:443
          token: github-grafana-access
          app: ${{ env.GRAFANA_APP }}
          listen: tcp://127.0.0.1:${{ env.GRAFANA_TUNNEL_PORT }}
          timeout-ms: '60000'

      - name: Setup - Verify Grafana tunnel
        shell: bash
        run: |
          set -euo pipefail

          # Wait until the local Teleport tunnel can reach Grafana.
          for attempt in {1..30}; do
            if curl --fail --silent --show-error --max-time 5 "http://127.0.0.1:${GRAFANA_TUNNEL_PORT}/api/health"; then
              echo "Grafana tunnel is reachable"
              exit 0
            fi
            sleep 1
          done

          echo "::error::Grafana tunnel did not become reachable"
          exit 1

      - name: Setup - Start Grafana MCP server
        shell: bash
        env:
          GRAFANA_ORG_ID: '1'
          GRAFANA_SERVICE_ACCOUNT_TOKEN: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${GRAFANA_SERVICE_ACCOUNT_TOKEN}" ]]; then
            echo "::error::GRAFANA_SERVICE_ACCOUNT_TOKEN secret is required"
            exit 1
          fi
          echo "::add-mask::${GRAFANA_SERVICE_ACCOUNT_TOKEN}"

          # Start MCP in read-only mode with just datasource and Loki tools.
          GRAFANA_URL="http://127.0.0.1:${GRAFANA_TUNNEL_PORT}" \
          GRAFANA_SERVICE_ACCOUNT_TOKEN="${GRAFANA_SERVICE_ACCOUNT_TOKEN}" \
          GRAFANA_ORG_ID="${GRAFANA_ORG_ID}" \
          nohup mcp-grafana \
            -t streamable-http \
            --address "127.0.0.1:${GRAFANA_MCP_PORT}" \
            --enabled-tools datasource,loki \
            --disable-write \
            > "${RUNNER_TEMP}/mcp-grafana.log" 2>&1 &
          echo "$!" > "${RUNNER_TEMP}/mcp-grafana.pid"

          # Wait until Claude can connect to the local MCP HTTP endpoint.
          for attempt in {1..20}; do
            if curl --fail --silent --show-error --max-time 2 "http://127.0.0.1:${GRAFANA_MCP_PORT}/healthz" >/dev/null; then
              echo "mcp-grafana is reachable"
              exit 0
            fi
            sleep 1
          done

          echo "::error::mcp-grafana did not become reachable"
          cat "${RUNNER_TEMP}/mcp-grafana.log" || true
          exit 1

      # Config: write the MCP config and prompt that Claude will consume.
      - name: Config - Write MCP config and prompt
        shell: bash
        run: |
          set -euo pipefail

          end_rfc3339="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          start_rfc3339="$(date -u -d "-${LOOKBACK_MINUTES} minutes" +"%Y-%m-%dT%H:%M:%SZ")"
          datasource_scope="all log-capable/Loki datasources"
          if [[ -n "${LOKI_DATASOURCE_UID}" ]]; then
            datasource_scope="datasource UID '${LOKI_DATASOURCE_UID}' plus any other relevant log datasource"
          fi
          mcp_config="${RUNNER_TEMP}/grafana-mcp-config.json"
          prompt_path="${RUNNER_TEMP}/grafana-mcp-prompt.txt"

          # Claude Code reads this file to discover the local Grafana MCP server.
          printf '{"mcpServers":{"grafana":{"type":"http","url":"http://127.0.0.1:%s/mcp"}}}\n' "$GRAFANA_MCP_PORT" > "$mcp_config"

          # Keep the task as plain text so the build shows exactly what was asked.
          cat > "$prompt_path" <<PROMPT
          ${USER_PROMPT}

          Use Grafana MCP only. First list Grafana datasources. Identify every log-capable/Loki datasource, not only a datasource named "loki". Query ${datasource_scope} for recent error, failed, not_found, timeout, exception, and controller/server failure signals from ${start_rfc3339} to ${end_rfc3339}. Find the last ${LIMIT} relevant rows across all queried datasources and group them by category.

          Print the datasources queried, query window, row count, a compact category summary, and a Markdown table with category, timestamp, datasource, namespace, pod or service, severity, and message. Avoid rows that only echo this query or show successful requests. Say clearly if no matching error rows are found. Do not print secrets.

          Format category findings like:
          - File Storage Management (code/core logic): DELETE /api/v2/filestorage returned 404 not_found; related error/failure signals from unikorn-region-server and uni-storage-filestorage-controller suggest the resource was already absent.
          PROMPT

          echo "Wrote MCP config to ${mcp_config}"
          echo "Wrote prompt to ${prompt_path}"

      # Prompt: Claude calls the MCP tools and prints the result to console and summary.
      - name: Prompt - Ask Claude through Grafana MCP
        shell: bash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]]; then
            echo "::error::CLAUDE_CODE_OAUTH_TOKEN secret is required"
            exit 1
          fi
          echo "::add-mask::${CLAUDE_CODE_OAUTH_TOKEN}"

          mcp_config="${RUNNER_TEMP}/grafana-mcp-config.json"
          prompt_path="${RUNNER_TEMP}/grafana-mcp-prompt.txt"
          result_path="${RUNNER_TEMP}/grafana-mcp-result.md"

          echo "=== Grafana MCP prompt ==="
          cat "$prompt_path"
          echo
          echo "=== Grafana MCP result ==="

          set +e
          npx --yes @anthropic-ai/claude-code \
            -p "$(cat "$prompt_path")" \
            --mcp-config "$mcp_config" \
            --strict-mcp-config \
            --allowedTools "mcp__grafana__list_datasources,mcp__grafana__query_loki_logs" \
            --permission-mode dontAsk \
            --no-session-persistence \
            2>&1 | tee "$result_path"
          claude_status=${PIPESTATUS[0]}
          set -e

          {
            echo "## Grafana MCP Prompt Result"
            echo
            echo "### Prompt"
            echo
            echo '```text'
            cat "$prompt_path"
            echo '```'
            echo
            echo "### Result"
            echo
            cat "$result_path"
          } >> "$GITHUB_STEP_SUMMARY"

          exit "$claude_status"

      # Clean: always expose MCP server logs and stop the background process.
      - name: Clean - Print MCP logs and stop server
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          echo "=== mcp-grafana log ==="
          cat "${RUNNER_TEMP}/mcp-grafana.log" 2>/dev/null || true
          {
            echo "## mcp-grafana Server Log"
            echo
            echo "<details><summary>Last 200 lines</summary>"
            echo
            echo '```text'
            tail -n 200 "${RUNNER_TEMP}/mcp-grafana.log" 2>/dev/null || true
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ -f "${RUNNER_TEMP}/mcp-grafana.pid" ]]; then
            kill "$(cat "${RUNNER_TEMP}/mcp-grafana.pid")" 2>/dev/null || true
          fi
