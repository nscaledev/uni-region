name: API Tests
on:
  schedule:
    - cron: '0 7 * * *'  # Run nightly at 7am UTC
  workflow_dispatch:
    inputs:
      run_dev:
        description: 'Run Dev tests'
        type: boolean
        default: true
      run_uat:
        description: 'Run UAT tests'
        type: boolean
        default: false
      use_staging_constellation:
        description: 'Use the staged constellation tag for UAT checkout'
        type: boolean
        default: true
      skip_slack_notifications:
        description: 'Skip Slack notifications'
        type: boolean
        default: false
      focus:
        description: 'Test suite to run'
        required: false
        default: 'All'
        type: choice
        options:
          - 'All'
          - 'Region Discovery'
          - 'Flavor Discovery'
          - 'Image Discovery'
          - 'External Network Discovery'
          - 'File Storage Management'
          - 'Network Management'
          - 'LoadBalancer'
      region_id:
        description: 'Override TEST_REGION_ID (leave empty to use default)'
        type: string
        required: false

permissions:
  contents: read

jobs:
  workflow-inputs-summary:
    name: Workflow input summary
    runs-on: ubuntu-latest
    steps:
    - name: Log workflow inputs
      env:
        EVENT_NAME: ${{ github.event_name }}
        RUN_DEV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_dev || 'true' }}
        RUN_UAT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_uat || 'false' }}
        USE_STAGING_CONSTELLATION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.use_staging_constellation || 'true' }}
        SKIP_SLACK_NOTIFICATIONS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_slack_notifications || 'false' }}
        FOCUS: ${{ github.event.inputs.focus || 'All' }}
        REGION_ID_OVERRIDE: ${{ inputs.region_id || '<default>' }}
      run: |
        cat <<EOF >> "$GITHUB_STEP_SUMMARY"
        ### Workflow Input Parameters
        - **Event:** \`$EVENT_NAME\`
        - **Run Dev:** \`$RUN_DEV\`
        - **Run UAT:** \`$RUN_UAT\`
        - **Use Staging Constellation:** \`$USE_STAGING_CONSTELLATION\`
        - **Skip Slack Notifications:** \`$SKIP_SLACK_NOTIFICATIONS\`
        - **Focus:** \`$FOCUS\`
        - **Region ID Override:** \`$REGION_ID_OVERRIDE\`
        EOF

  find-dev-deployed-version:
    name: Resolve Dev test ref
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.run_dev == 'true'
    outputs:
      ref: ${{ steps.find.outputs.ref }}
      version: ${{ steps.find.outputs.version }}
    steps:
    - name: Resolve Dev checkout ref
      uses: nscaledev/quality-tooling/.github/actions/uni-find-staging-constellation@main
      id: find
      with:
        service: uni-region
        releases-read-token: ${{ secrets.RELEASES_READ_TOKEN }}
        use-version-api: true
        version-api-url: ${{ vars.DEV_REGION_BASE_URL }}/api/version
        version-api-token: ${{ secrets.DEV_API_AUTH_TOKEN }}
        fallback-to-constellation: false
        summary-title: Dev API Test Version

  API-Tests-Dev:
    name: API Tests (dev)
    needs: find-dev-deployed-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for Teleport-backed Grafana lookup and OTLP collector shipping.
      id-token: write
    # Runs only when the resolver produced a Dev checkout ref.
    if: (github.event_name == 'schedule' || github.event.inputs.run_dev == 'true') && needs.find-dev-deployed-version.outputs.ref != ''
    env:
      ENVIRONMENT: dev
      API_BASE_URL: ${{ vars.DEV_API_BASE_URL }}
      REGION_BASE_URL: ${{ vars.DEV_REGION_BASE_URL }}
      API_AUTH_TOKEN: ${{ secrets.DEV_API_AUTH_TOKEN }}
      TEST_ORG_ID: ${{ vars.DEV_TEST_ORG_ID }}
      TEST_PROJECT_ID: ${{ vars.DEV_TEST_PROJECT_ID }}
      TEST_REGION_ID: ${{ inputs.region_id || vars.DEV_TEST_REGION_ID }}
      TEST_NETWORK_ID: ${{ vars.DEV_TEST_NETWORK_ID }}
      TEST_PRIVATE_REGION_ID: ${{ vars.DEV_TEST_PRIVATE_REGION_ID }}
      TEST_SECONDARY_ORG_ID: ${{ vars.DEV_TEST_SECONDARY_ORG_ID }}
      TEST_SECONDARY_PROJECT_ID: ${{ vars.DEV_TEST_SECONDARY_PROJECT_ID }}
      TEST_SECONDARY_AUTH_TOKEN: ${{ secrets.DEV_TEST_SECONDARY_AUTH_TOKEN }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.find-dev-deployed-version.outputs.ref }}

    - name: Setup Go
      uses: actions/setup-go@v3
      with:
        go-version-file: go.mod
        cache: true

    - name: Touch
      run: make touch

    - name: Run API Tests
      if: github.event.inputs.focus == '' || github.event.inputs.focus == 'All'
      run: make test-api

    - name: Run API Tests with Focus
      if: github.event.inputs.focus != '' && github.event.inputs.focus != 'All'
      run: make test-api-focus FOCUS="${{ github.event.inputs.focus }}"

    - name: Archive API Test Results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: api-test-results-dev
        path: test-results.json

    - name: Archive API Test JUnit Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: api-test-junit-dev
        path: junit.xml

    - name: Create Linear Issues for Test Failures
      uses: nscaledev/quality-tooling/.github/actions/linear-test-failures@main
      if: ${{ !cancelled() }}
      with:
        test-results-path: test-results.json
        workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        linear-api-key: ${{ secrets.LINEAR_API_KEY }}
        linear-team-id: ${{ vars.LINEAR_TEAM_ID }}
        linear-project-id: ${{ vars.LINEAR_PROJECT_ID }}
        environment: dev
        linear-priority: '3'
        max-failures: '5'

    - name: Report API Test Results
      uses: nscaledev/quality-tooling/.github/actions/test-results-report@codex/slack-deployed-version
      if: ${{ !cancelled() }}
      with:
        test-results-path: test-results.json
        format: ginkgo-json
        workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        slack-webhook-url: ${{ secrets.SLACK_API_TESTING_TMP_WEBHOOK_URL }}
        send-slack: ${{ github.event.inputs.skip_slack_notifications != 'true' && 'true' || 'false' }}
        environment: dev
        deployed-version: ${{ needs.find-dev-deployed-version.outputs.version || needs.find-dev-deployed-version.outputs.ref }}
        title: 'Region API Test Results'
        test-history-suite: uni-region-api
        enable-ai-analysis: 'true'
        claude-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        enable-grafana-log-enrichment: 'true'
        grafana-service-account-token: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
        enable-unikorn-cr-enrichment: 'true'
        unikorn-cr-teleport-token: github-unikorn-cr-reader
        unikorn-cr-kube-cluster: nks-dev-glo1

  find-uat-deployed-version:
    name: Resolve UAT test ref
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.run_uat == 'true'
    outputs:
      ref: ${{ steps.find.outputs.ref }}
      version: ${{ steps.find.outputs.version }}
    steps:
    - name: Resolve UAT checkout ref
      uses: nscaledev/quality-tooling/.github/actions/uni-find-staging-constellation@main
      id: find
      with:
        service: uni-region
        releases-read-token: ${{ secrets.RELEASES_READ_TOKEN }}
        use-staging-constellation: ${{ github.event_name == 'schedule' || github.event.inputs.use_staging_constellation != 'false' }}
        use-version-api: true
        version-api-url: ${{ vars.UAT_REGION_BASE_URL }}/api/version
        version-api-token: ${{ secrets.UAT_API_AUTH_TOKEN }}
        fallback-to-constellation: false
        summary-title: UAT API Test Version

  API-Tests-UAT:
    name: API Tests (uat)
    needs: find-uat-deployed-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for Teleport-backed Grafana lookup and OTLP collector shipping.
      id-token: write
    # Runs only when the resolver produced a UAT checkout ref.
    if: (github.event_name == 'schedule' || github.event.inputs.run_uat == 'true') && needs.find-uat-deployed-version.outputs.ref != ''
    env:
      ENVIRONMENT: uat
      API_BASE_URL: ${{ vars.UAT_API_BASE_URL }}
      REGION_BASE_URL: ${{ vars.UAT_REGION_BASE_URL }}
      API_AUTH_TOKEN: ${{ secrets.UAT_API_AUTH_TOKEN }}
      TEST_ORG_ID: ${{ vars.UAT_TEST_ORG_ID }}
      TEST_PROJECT_ID: ${{ vars.UAT_TEST_PROJECT_ID }}
      TEST_REGION_ID: ${{ inputs.region_id || vars.UAT_TEST_REGION_ID }}
      TEST_NETWORK_ID: ${{ vars.UAT_TEST_NETWORK_ID }}
      TEST_PRIVATE_REGION_ID: ${{ vars.UAT_TEST_PRIVATE_REGION_ID }}
      TEST_SECONDARY_ORG_ID: ${{ vars.UAT_TEST_SECONDARY_ORG_ID }}
      TEST_SECONDARY_PROJECT_ID: ${{ vars.UAT_TEST_SECONDARY_PROJECT_ID }}
      TEST_SECONDARY_AUTH_TOKEN: ${{ secrets.UAT_TEST_SECONDARY_AUTH_TOKEN }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ needs.find-uat-deployed-version.outputs.ref }}

    - name: Setup Go
      uses: actions/setup-go@v3
      with:
        go-version-file: go.mod
        cache: true

    - name: Touch
      run: make touch

    - name: Run API Tests
      if: github.event.inputs.focus == '' || github.event.inputs.focus == 'All'
      run: make test-api

    - name: Run API Tests with Focus
      if: github.event.inputs.focus != '' && github.event.inputs.focus != 'All'
      run: make test-api-focus FOCUS="${{ github.event.inputs.focus }}"

    - name: Archive API Test Results
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: api-test-results-uat
        path: test-results.json

    - name: Archive API Test JUnit Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: api-test-junit-uat
        path: junit.xml

    - name: Create Linear Issues for Test Failures
      uses: nscaledev/quality-tooling/.github/actions/linear-test-failures@main
      if: ${{ !cancelled() }}
      with:
        test-results-path: test-results.json
        workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        linear-api-key: ${{ secrets.LINEAR_API_KEY }}
        linear-team-id: ${{ vars.LINEAR_TEAM_ID }}
        linear-project-id: ${{ vars.LINEAR_PROJECT_ID }}
        environment: uat
        linear-priority: '3'
        max-failures: '5'

    - name: Report API Test Results
      uses: nscaledev/quality-tooling/.github/actions/test-results-report@codex/slack-deployed-version
      if: ${{ !cancelled() }}
      with:
        test-results-path: test-results.json
        format: ginkgo-json
        workflow-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        slack-webhook-url: ${{ secrets.SLACK_API_TESTING_TMP_WEBHOOK_URL }}
        send-slack: ${{ github.event.inputs.skip_slack_notifications != 'true' && 'true' || 'false' }}
        environment: uat
        deployed-version: ${{ needs.find-uat-deployed-version.outputs.version || needs.find-uat-deployed-version.outputs.ref }}
        title: 'Region API Test Results'
        test-history-suite: uni-region-api
        enable-ai-analysis: 'true'
        claude-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        enable-grafana-log-enrichment: 'true'
        grafana-service-account-token: ${{ secrets.GRAFANA_SERVICE_ACCOUNT_TOKEN }}
        enable-unikorn-cr-enrichment: 'true'
        unikorn-cr-teleport-token: github-unikorn-cr-reader
        unikorn-cr-kube-cluster: nks-stg-europe-west2
